name: Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm with trusted publishing after all release gates pass
        required: true
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  prepare-release:
    name: prepare-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update npm for trusted publishing
        run: npm install --global npm@latest

      - name: Build package
        run: pnpm build

      - name: Verify pinned toolchain
        run: pnpm verify:toolchain

      - name: Verify clean build
        run: pnpm verify:clean-build

      - name: Verify packed tarball contents
        run: pnpm verify:pack

      - name: Verify packed export surface
        run: pnpm verify:exports

      - name: Verify workspace pack smoke
        run: pnpm verify:workspace-smoke

      - name: Verify dependency policy
        run: pnpm verify:dependency-policy

      - name: Verify release metadata generator
        run: pnpm verify:release-metadata

      - name: Emit release metadata artifacts
        run: pnpm release:metadata -- --output-dir artifacts/release

      - name: Generate GitHub build attestation
        id: attest
        uses: actions/attest@v4
        with:
          subject-path: artifacts/release/*.tgz

      - name: Persist attestation metadata in the release bundle
        env:
          ATTESTATION_URL: ${{ steps.attest.outputs.attestation-url }}
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          node --input-type=module <<'EOF'
          import { basename } from 'node:path';
          import { copyFileSync, readFileSync, writeFileSync } from 'node:fs';
          const provenancePath = 'artifacts/release/provenance-metadata.json';
          const metadata = JSON.parse(readFileSync(provenancePath, 'utf8'));
          metadata.githubAttestation.attestationUrl = process.env.ATTESTATION_URL || null;
          if (process.env.BUNDLE_PATH) {
            const copiedBundlePath = `artifacts/release/${basename(process.env.BUNDLE_PATH)}`;
            copyFileSync(process.env.BUNDLE_PATH, copiedBundlePath);
            metadata.githubAttestation.bundlePath = `./${copiedBundlePath}`;
          } else {
            metadata.githubAttestation.bundlePath = null;
          }
          writeFileSync(provenancePath, `${JSON.stringify(metadata, null, 2)}\n`);
          EOF

      - name: Upload release metadata bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-${{ github.sha }}
          if-no-files-found: error
          path: artifacts/release

  publish-with-provenance:
    name: publish-with-provenance
    needs: prepare-release
    runs-on: ubuntu-latest
    if: ${{ always() && needs.prepare-release.result == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Download release metadata bundle
        uses: actions/download-artifact@v4
        with:
          name: release-metadata-${{ github.sha }}
          path: artifacts/release

      - name: Publish package to npm
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true && github.ref == 'refs/heads/master' }}
        run: npm publish artifacts/release/*.tgz

      - name: Tag published release commit
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true && github.ref == 'refs/heads/master' }}
        run: |
          VERSION="$(node --input-type=module <<'EOF'
          import { readFileSync } from 'node:fs';
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          process.stdout.write(`v${pkg.version}`);
          EOF
          )"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists" >&2
            exit 1
          fi
          git tag "$VERSION" "$GITHUB_SHA"
          git push origin "$VERSION"

      - name: Write publish-with-provenance evidence
        env:
          PUBLISH_REQUESTED: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true }}
          PUBLISH_ALLOWED: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' }}
          PUBLISH_PERFORMED: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true && github.ref == 'refs/heads/master' }}
        run: |
          node scripts/release-workflow-evidence.mjs publish \
            --metadata-dir artifacts/release \
            --publish-requested "$PUBLISH_REQUESTED" \
            --publish-allowed "$PUBLISH_ALLOWED" \
            --publish-performed "$PUBLISH_PERFORMED"

      - name: Upload publish-with-provenance evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-publish-${{ github.sha }}
          if-no-files-found: error
          path: artifacts/release

  post-publish-verify:
    name: post-publish-verify
    needs:
      - prepare-release
      - publish-with-provenance
    runs-on: ubuntu-latest
    if: ${{ always() && needs.prepare-release.result == 'success' && needs.publish-with-provenance.result == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags origin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Download publish-with-provenance bundle
        uses: actions/download-artifact@v4
        with:
          name: release-publish-${{ github.sha }}
          path: artifacts/release

      - name: Write post-publish verification evidence
        env:
          PUBLISH_REQUESTED: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true }}
          PUBLISH_ALLOWED: ${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master' }}
          PUBLISH_PERFORMED: ${{ github.event_name == 'workflow_dispatch' && inputs.publish == true && github.ref == 'refs/heads/master' }}
        run: |
          node scripts/release-workflow-evidence.mjs verify \
            --metadata-dir artifacts/release \
            --publish-requested "$PUBLISH_REQUESTED" \
            --publish-allowed "$PUBLISH_ALLOWED" \
            --publish-performed "$PUBLISH_PERFORMED"

      - name: Upload final release evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ github.sha }}
          if-no-files-found: error
          path: artifacts/release
